<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>GUARNIC – Gestión inteligente de operaciones en terreno</title>
<meta name="description" content="Guarnic optimiza las operaciones en terreno con supervisión en tiempo real, control de asistencia y gestión de equipos."/>
<meta property="og:title" content="GUARNIC – Gestión inteligente de operaciones en terreno"/>
<meta property="og:description" content="Optimiza tus operaciones en tiempo real con tecnología avanzada."/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#3f8dd8;
  --primary-10:rgba(63,141,216,0.1);
  --primary-18:rgba(63,141,216,0.18);
  --title:#171717;
  --text:#4d4d4d;
  --muted:rgba(0,0,0,0.45);
  --stroke:#e8e8e8;
  --card:#fbfbfb;
  --white:#fff;
  --green:#22c55e;
}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;color:var(--title);background:var(--white);overflow-x:hidden}
img{display:block;max-width:100%}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none}

@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeRight{from{opacity:0;transform:translateX(24px)}to{opacity:1;transform:translateX(0)}}
@keyframes blob{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(16px,-16px) scale(1.04)}66%{transform:translate(-12px,12px) scale(.97)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes ping{0%,100%{box-shadow:0 0 0 3px rgba(34,197,94,.2)}50%{box-shadow:0 0 0 7px rgba(34,197,94,.07)}}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}

.fade-up{opacity:0;transform:translateY(24px);transition:opacity .6s ease,transform .6s ease}
.fade-up.in{opacity:1;transform:translateY(0)}
.fade-left{opacity:0;transform:translateX(-24px);transition:opacity .6s ease,transform .6s ease}
.fade-left.in{opacity:1;transform:translateX(0)}
.d1{transition-delay:.1s}.d2{transition-delay:.2s}.d3{transition-delay:.3s}.d4{transition-delay:.4s}

.btn{display:inline-flex;align-items:center;justify-content:center;padding:11px 18px;border-radius:12px;font-size:14px;font-weight:500;transition:all .22s ease;white-space:nowrap;cursor:pointer}
.btn-primary{background:var(--primary);color:#fff;border:none}
.btn-primary:hover{background:#3580ca;transform:translateY(-2px);box-shadow:0 6px 22px rgba(63,141,216,.35)}
.btn-outline{background:var(--white);color:var(--text);border:1px solid var(--stroke)}
.btn-outline:hover{border-color:var(--primary);color:var(--primary);transform:translateY(-1px)}

nav.top{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.9);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--stroke);padding:18px 64px;transition:box-shadow .3s}
nav.top.scrolled{box-shadow:0 2px 24px rgba(0,0,0,.06)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;max-width:1200px;margin:0 auto}
.nav-logo{display:flex;align-items:center;gap:8px}
.nav-logo img{width:30px;height:34px;object-fit:contain}
.nav-logo-name{font-size:22px;font-weight:900;letter-spacing:-.5px}
.nav-links{display:flex;gap:24px;flex:1;padding-left:40px}
.nav-link{font-size:14px;font-weight:500;color:var(--text);position:relative;padding:4px 0;transition:color .2s;display:flex;align-items:center;gap:3px}
.nav-link::after{content:'';position:absolute;bottom:0;left:0;width:0;height:1.5px;background:var(--primary);transition:width .25s}
.nav-link:hover{color:var(--primary)}
.nav-link:hover::after{width:100%}
.nav-btns{display:flex;gap:10px}

.hero{padding:10px 64px 70px;position:relative;overflow:hidden}
.blob{position:absolute;border-radius:50%;filter:blur(80px);pointer-events:none;z-index:0}
.blob-1{width:500px;height:500px;background:rgba(63,141,216,.07);top:-120px;right:-80px;animation:blob 9s ease-in-out infinite}
.blob-2{width:300px;height:300px;background:rgba(63,141,216,.05);bottom:-60px;left:5%;animation:blob 12s ease-in-out infinite reverse}
.hero-inner{display:flex;align-items:center;gap:64px;max-width:1080px;margin:0 auto;position:relative;z-index:1}
.hero-content{flex:1;display:flex;flex-direction:column;gap:28px;padding:50px 0;animation:fadeUp .65s ease .05s both}
.hero-badge{display:inline-flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--stroke);padding:8px 14px 8px 8px;border-radius:100px;width:fit-content;transition:transform .2s,box-shadow .2s}
.hero-badge:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.08)}
.hero-badge img{width:34px;height:34px;border-radius:50%;object-fit:cover}
.hero-badge span{font-size:13px;font-weight:500}
.hero-title{font-size:44px;font-weight:700;line-height:50px;letter-spacing:-1px;animation:fadeUp .65s ease .2s both;opacity:0}
.hero-title .grad{background:linear-gradient(135deg,var(--primary),#6db8f5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-desc{font-size:16px;font-weight:500;line-height:25px;color:var(--text);max-width:450px;animation:fadeUp .65s ease .35s both;opacity:0}
.hero-btns{display:flex;flex-wrap:wrap;gap:12px;animation:fadeUp .65s ease .5s both;opacity:0}
.hero-stats{display:flex;gap:36px;padding-top:12px;border-top:1px solid var(--stroke);animation:fadeUp .65s ease .65s both;opacity:0}
.stat-n{font-size:24px;font-weight:800;letter-spacing:-.5px}
.stat-l{font-size:12px;color:#999;margin-top:2px}
.hero-img-wrap{flex:1;position:relative;animation:fadeRight .75s ease .15s both;opacity:0}
.hero-img-wrap img{width:100%;height:500px;object-fit:cover;border-radius:24px;box-shadow:0 28px 64px rgba(63,141,216,.15);transition:transform .4s}
.hero-img-wrap:hover img{transform:scale(1.015) translateY(-4px)}
.float-card{position:absolute;bottom:28px;left:-20px;background:#fff;border-radius:16px;padding:12px 16px;box-shadow:0 8px 32px rgba(0,0,0,.12);display:flex;align-items:center;gap:12px;z-index:2;animation:float 3.5s ease-in-out infinite}
.live-dot{width:10px;height:10px;background:var(--green);border-radius:50%;flex-shrink:0;animation:ping 2s infinite}
.float-txt{font-size:12px;font-weight:600}
.float-sub{font-size:11px;color:#999}

.section{padding:80px 64px;display:flex;justify-content:center}
.container{max-width:1080px;width:100%}
.sec-tag{font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--primary);text-transform:uppercase;margin-bottom:10px}
.sec-title{font-size:30px;font-weight:700;line-height:36px;letter-spacing:-.6px}
.sec-sub{font-size:16px;font-weight:500;line-height:24px;color:var(--muted);margin-top:10px}

.what-inner{display:flex;gap:64px;align-items:center}
.what-img{width:320px;flex-shrink:0;border-radius:24px;overflow:hidden;box-shadow:0 12px 48px rgba(63,141,216,.14)}
.what-img img{width:100%;height:360px;object-fit:cover}
.what-c{display:flex;flex-direction:column;gap:18px;flex:1}
.dt-pill{display:inline-flex;align-items:center;gap:8px;background:var(--primary-10);border:1px solid rgba(63,141,216,.3);padding:9px 14px 9px 9px;border-radius:100px;width:fit-content;transition:background .2s,transform .2s}
.dt-pill:hover{background:var(--primary-18);transform:translateY(-1px)}
.dt-pill img{width:22px;height:22px}
.dt-pill span{font-size:13px;font-weight:500;color:var(--primary)}

.cards-row{display:flex;gap:16px;margin-top:40px}
.ch-card{background:#fff;border:1px solid var(--stroke);border-radius:20px;padding:24px;flex:1;display:flex;flex-direction:column;gap:14px;position:relative;overflow:hidden;transition:transform .3s,box-shadow .3s,border-color .3s}
.ch-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--primary-10),transparent 60%);opacity:0;transition:opacity .3s}
.ch-card:hover{transform:translateY(-5px);box-shadow:0 12px 40px rgba(63,141,216,.12);border-color:rgba(63,141,216,.2)}
.ch-card:hover::before{opacity:1}
.ch-num{font-size:11px;font-weight:700;color:var(--primary);letter-spacing:1.2px;opacity:.6}
.ch-icon{width:40px;height:40px;background:var(--primary-10);border-radius:10px;display:flex;align-items:center;justify-content:center;transition:transform .2s}
.ch-card:hover .ch-icon{transform:scale(1.1)}
.ch-icon img{width:24px;height:24px}
.ch-title{font-size:16px;font-weight:600;letter-spacing:-.3px}
.ch-desc{font-size:14px;line-height:21px;color:var(--text)}

.feat-list{display:flex;flex-direction:column;gap:16px;width:100%;max-width:820px}
.feat-card{background:#fff;border:1px solid var(--stroke);border-radius:24px;display:flex;align-items:stretch;overflow:hidden;transition:box-shadow .3s,transform .3s,border-color .3s;position:relative}
.feat-card::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;background:var(--primary);border-radius:0 2px 2px 0;opacity:0;transform:scaleY(0);transition:opacity .3s,transform .35s}
.feat-card:hover{box-shadow:0 14px 44px rgba(63,141,216,.12);transform:translateY(-3px);border-color:rgba(63,141,216,.15)}
.feat-card:hover::before{opacity:1;transform:scaleY(1)}
.feat-txt{flex:1;padding:36px 40px;display:flex;flex-direction:column;gap:10px}
.feat-lbl{font-size:10px;font-weight:700;color:var(--primary);letter-spacing:2px;text-transform:uppercase}
.feat-title{font-size:20px;font-weight:600;line-height:27px;letter-spacing:-.4px}
.feat-desc{font-size:15px;line-height:22px;color:var(--muted)}
.feat-link{font-size:13px;font-weight:600;color:var(--primary);display:inline-flex;align-items:center;gap:4px;margin-top:4px;transition:gap .2s}
.feat-link:hover{gap:9px}
.feat-img{width:360px;flex-shrink:0;overflow:hidden;background:var(--card)}
.feat-img img{width:100%;height:100%;object-fit:cover;object-position:top;transition:transform .5s}
.feat-card:hover .feat-img img{transform:scale(1.05)}

.why-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:100%}
.why-card{background:#fff;border:1px solid var(--stroke);border-radius:20px;padding:20px;display:flex;flex-direction:column;gap:12px;transition:all .3s;position:relative;overflow:hidden}
.why-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),#6db8f5);transform:scaleX(0);transition:transform .3s;transform-origin:left}
.why-card:hover{box-shadow:0 10px 36px rgba(63,141,216,.12);transform:translateY(-4px);border-color:rgba(63,141,216,.15)}
.why-card:hover::after{transform:scaleX(1)}
.why-icon{width:34px;height:34px}
.why-t{font-size:15px;font-weight:600;letter-spacing:-.2px}
.why-d{font-size:13px;line-height:19px;color:var(--text)}

.ind-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;width:100%}
.ind-card{background:#fff;border:1px solid var(--stroke);border-radius:22px;overflow:hidden;display:flex;flex-direction:column;transition:all .35s}
.ind-card:hover{box-shadow:0 18px 52px rgba(0,0,0,.1);transform:translateY(-7px)}
.ind-img-wrap{overflow:hidden;height:200px;position:relative}
.ind-img-wrap::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,transparent 50%,rgba(0,0,0,.25));opacity:0;transition:opacity .3s}
.ind-card:hover .ind-img-wrap::after{opacity:1}
.ind-img{width:100%;height:100%;object-fit:cover;transition:transform .5s}
.ind-card:hover .ind-img{transform:scale(1.06)}
.ind-c{padding:18px;display:flex;flex-direction:column;gap:7px;flex:1}
.ind-name{font-size:16px;font-weight:600;letter-spacing:-.3px}
.ind-desc{font-size:13px;line-height:19px;color:var(--text);flex:1}
.ind-link{font-size:13px;font-weight:600;color:var(--primary);display:inline-flex;align-items:center;gap:4px;transition:gap .2s}
.ind-link:hover{gap:9px}
.ind-link::after{content:'→'}

.logos-wrap{width:100%;overflow:hidden;position:relative}
.logos-wrap::before,.logos-wrap::after{content:'';position:absolute;top:0;bottom:0;width:120px;z-index:2}
.logos-wrap::before{left:0;background:linear-gradient(to right,#fff,transparent)}
.logos-wrap::after{right:0;background:linear-gradient(to left,#fff,transparent)}
.logos-track{display:flex;gap:40px;align-items:center;animation:marquee 22s linear infinite;width:max-content}
.logos-track:hover{animation-play-state:paused}
.logo-chip{background:var(--card);border:1px solid var(--stroke);border-radius:12px;padding:11px 26px;font-size:13px;font-weight:700;color:#ccc;white-space:nowrap;flex-shrink:0;transition:color .2s,border-color .2s}
.logo-chip:hover{color:var(--primary);border-color:rgba(63,141,216,.3)}

.faq-in{display:flex;gap:80px;max-width:1080px;width:100%}
.faq-l{flex-shrink:0;max-width:300px;display:flex;flex-direction:column;gap:18px}
.faq-list{flex:1}
.faq-item{border-bottom:1px solid var(--stroke)}
.faq-q{display:flex;align-items:center;gap:12px;padding:20px 8px;cursor:pointer}
.faq-icon{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--stroke);display:flex;align-items:center;justify-content:center;font-size:18px;line-height:1;color:var(--text);flex-shrink:0;transition:all .25s}
.faq-q.open .faq-icon{background:var(--primary);border-color:var(--primary);color:#fff;transform:rotate(45deg)}
.faq-q-text{font-size:15px;font-weight:500;line-height:22px;transition:color .2s}
.faq-q.open .faq-q-text{color:var(--primary)}
.faq-ans{font-size:14px;line-height:21px;color:var(--text);padding:0 8px 0 52px;max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s}
.faq-ans.open{max-height:200px;padding:0 8px 20px 52px}

.demo-wrap{display:flex;justify-content:center;padding:0 64px 100px}
.demo-card{background:linear-gradient(135deg,#eef6ff 0%,var(--card) 100%);border:1px solid rgba(63,141,216,.15);border-radius:28px;padding:50px;display:flex;align-items:flex-start;gap:50px;max-width:880px;width:100%;box-shadow:0 10px 48px rgba(63,141,216,.1);position:relative;overflow:hidden}
.demo-card::before{content:'';position:absolute;top:-80px;right:-80px;width:240px;height:240px;background:rgba(63,141,216,.06);border-radius:50%}
.demo-info{flex:1;position:relative;z-index:1}
.demo-title{font-size:22px;font-weight:700;color:var(--primary);letter-spacing:-.5px;margin-bottom:10px}
.demo-desc{font-size:14px;line-height:21px;color:#8a8a8a;max-width:270px}
.demo-perks{margin-top:22px;display:flex;flex-direction:column;gap:9px}
.perk{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;color:var(--text)}
.perk::before{content:'✓';color:#22c55e;font-weight:700;font-size:14px}
.demo-form{width:296px;flex-shrink:0;display:flex;flex-direction:column;gap:12px;position:relative;z-index:1}
.f-field{display:flex;flex-direction:column;gap:4px}
.f-lbl{font-size:13px;color:rgba(0,0,0,.75);font-weight:500}
.f-input{border:1.5px solid #e0e0e0;border-radius:10px;padding:10px 14px;font-size:14px;font-family:'Inter',sans-serif;color:var(--title);background:#fff;width:100%;transition:border-color .2s,box-shadow .2s;outline:none}
.f-input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(63,141,216,.14)}
.f-submit{background:var(--primary);color:#fff;border-radius:10px;padding:13px;font-size:14px;font-weight:600;font-family:'Inter',sans-serif;width:100%;border:none;cursor:pointer;transition:all .22s}
.f-submit:hover{background:#3580ca;transform:translateY(-2px);box-shadow:0 8px 24px rgba(63,141,216,.35)}
.f-submit.sent{background:#22c55e}
.f-submit:disabled{cursor:default}

footer{border-top:1px solid var(--stroke);padding:80px 64px 40px;display:flex;justify-content:center;background:var(--card)}
.ft-in{max-width:1080px;width:100%;display:flex;flex-direction:column;gap:60px}
.ft-top{display:flex;justify-content:space-between}
.ft-brand{max-width:260px;display:flex;flex-direction:column;gap:32px}
.ft-name{font-size:22px;font-weight:900;letter-spacing:-.5px}
.ft-desc{font-size:13px;line-height:20px;color:var(--text);margin-top:6px}
.ft-socials{display:flex;gap:12px}
.soc-btn{width:36px;height:36px;border-radius:10px;border:1px solid var(--stroke);display:flex;align-items:center;justify-content:center;background:#fff;transition:all .2s;cursor:pointer}
.soc-btn img{width:17px;height:17px}
.soc-btn:hover{border-color:var(--primary);background:var(--primary-10);transform:translateY(-2px)}
.ft-nav{display:flex;gap:56px}
.ft-col{display:flex;flex-direction:column;gap:10px}
.ft-col-t{font-size:14px;font-weight:700;margin-bottom:4px}
.ft-col a{font-size:13px;font-weight:500;color:var(--text);transition:color .2s;display:block}
.ft-col a:hover{color:var(--primary)}
.ft-bot{display:flex;justify-content:space-between;border-top:1px solid var(--stroke);padding-top:24px}
.ft-copy{font-size:13px;color:#bbb}
.ft-legal{display:flex;gap:20px}
.ft-legal a{font-size:13px;color:#bbb;transition:color .2s}
.ft-legal a:hover{color:var(--primary)}

.btt{position:fixed;bottom:32px;right:32px;z-index:50;width:44px;height:44px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(63,141,216,.4);font-size:20px;font-weight:700;cursor:pointer;transition:all .3s;opacity:0;transform:translateY(16px);border:none}
.btt.on{opacity:1;transform:translateY(0)}
.btt:hover{transform:translateY(-4px);box-shadow:0 10px 28px rgba(63,141,216,.5)}

/* WhatsApp flotante */
.whatsapp{position:fixed;bottom:32px;left:32px;z-index:50;width:52px;height:52px;border-radius:50%;background:#25d366;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 18px rgba(37,211,102,.4);cursor:pointer;transition:all .3s;border:none;text-decoration:none}
.whatsapp:hover{transform:translateY(-4px);box-shadow:0 10px 28px rgba(37,211,102,.5)}
.whatsapp svg{width:28px;height:28px;fill:#fff}

@media(max-width:768px){
  nav.top{padding:16px 20px}
  .nav-links,.nav-btns{display:none}
  .hero{padding:20px 20px 50px}
  .hero-inner{flex-direction:column;gap:24px}
  .hero-img-wrap{order:-1}
  .hero-img-wrap img{height:220px;border-radius:20px}
  .float-card{display:none}
  .hero-content{padding:0;gap:20px}
  .hero-title{font-size:28px;line-height:34px;text-align:center}
  .hero-desc{text-align:center;font-size:14px}
  .hero-btns{flex-direction:column}
  .hero-btns .btn{width:100%}
  .hero-stats{justify-content:center}
  .section{padding:50px 20px}
  .what-inner{flex-direction:column}
  .what-img{display:none}
  .cards-row{flex-direction:column}
  .feat-card{flex-direction:column}
  .feat-img{width:100%;height:180px}
  .feat-txt{padding:22px}
  .feat-title{font-size:18px}
  .why-grid{grid-template-columns:1fr}
  .ind-grid{grid-template-columns:1fr}
  .faq-in{flex-direction:column;gap:24px}
  .faq-l{max-width:100%}
  .demo-wrap{padding:0 20px 60px}
  .demo-card{flex-direction:column;padding:28px 20px;gap:28px}
  .demo-form{width:100%}
  footer{padding:50px 20px 30px}
  .ft-top{flex-direction:column;gap:32px}
  .ft-nav{flex-direction:column;gap:24px}
  .ft-bot{flex-direction:column;gap:12px}
  .btt{bottom:20px;right:20px}
  .whatsapp{bottom:20px;left:20px}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const IMGS = {
  logo: "https://www.figma.com/api/mcp/asset/36bf0a44-67b8-4966-a66a-e1e88fd47c98",
  dt: "https://www.figma.com/api/mcp/asset/1f2e9df7-2aae-4a63-9833-466e58e1a553",
  hero: "https://www.figma.com/api/mcp/asset/7a07609c-eccf-42d9-aaf9-5887395bf912",
  what: "https://www.figma.com/api/mcp/asset/88aec6ed-0022-4077-b5f8-f6ef6346fd2a",
  verified: "https://www.figma.com/api/mcp/asset/875d956c-5d2d-443b-8175-39a7581605d6",

function useReveal() {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting) { setVisible(true); obs.disconnect(); }
    }, { threshold: 0.12 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return [ref, visible];
}

function useCounter(target, suffix = '', active = false) {
  const [val, setVal] = useState('0' + suffix);
  useEffect(() => {
    if (!active) return;
    let start = null;
    const step = ts => {
      if (!start) start = ts;
      const p = Math.min((ts - start) / 1800, 1);
      const ease = 1 - Math.pow(1 - p, 3);
      setVal(Math.floor(ease * target) + suffix);
      if (p < 1) requestAnimationFrame(step);
    };
    requestAnimationFrame(step);
  }, [active, target, suffix]);
  return val;
}

function RevealSection({ children, className = '', delay = '', style = {} }) {
  const [ref, visible] = useReveal();
  return (

}
